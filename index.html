<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Paper Editor — School ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="bg-ink-50 text-ink-900 font-sans min-h-screen">

  <!-- Top Nav Bar -->
  <header id="app-header">
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#c0392b"/>
        <path d="M7 8h14M7 14h10M7 20h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="21" cy="20" r="3" fill="#f0c040"/>
      </svg>
      <span class="header-title">PaperCraft</span>
      <span class="header-subtitle">Question Paper Editor</span>
    </div>
    <div class="header-actions">
      <button id="btn-load" class="btn-header" title="Load saved paper">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Load
      </button>
      <button id="btn-save" class="btn-header" title="Save to JSON">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 0-2-2V5a2 2 0 0 0 2-2h11l5 5v11a2 2 0 0 0-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save JSON
      </button>
      <button id="btn-export-pdf" class="btn-header btn-primary" title="Export as PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export PDF
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div id="toolbar-container"></div>

  <!-- Main Layout -->
  <main id="main-layout">

    <!-- Editor Panel -->
    <section id="editor-panel">
      <div class="panel-label">✍ EDITOR</div>
      <div id="editor-container"></div>
    </section>

    <!-- Divider -->
    <div id="panel-divider">
      <div class="divider-line"></div>
      <div class="divider-icon">⇄</div>
      <div class="divider-line"></div>
    </div>

    <!-- Preview Panel -->
    <section id="preview-panel">
      <div class="panel-label">👁 LIVE PREVIEW</div>
      <div id="preview-container"></div>
    </section>

  </main>

  <!-- Math Input Modal -->
  <div id="math-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Insert Formula</h3>
        <button id="math-modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="formula-tabs">
          <button class="formula-tab active" data-mode="latex">LaTeX / KaTeX</button>
          <button class="formula-tab" data-mode="shortcuts">Quick Shortcuts</button>
        </div>
        <div id="formula-latex-panel">
          <label class="input-label">Enter LaTeX expression:</label>
          <input type="text" id="math-input" class="formula-input" placeholder="e.g. \frac{a}{b}, x^2 + y^2, \sqrt{x}" />
          <div class="formula-preview-label">Preview:</div>
          <div id="math-preview" class="formula-preview"></div>
        </div>
        <div id="formula-shortcuts-panel" class="hidden">
          <div class="shortcuts-grid">
            <button class="shortcut-btn" data-latex="\frac{a}{b}">a/b</button>
            <button class="shortcut-btn" data-latex="x^{2}">x²</button>
            <button class="shortcut-btn" data-latex="\sqrt{x}">√x</button>
            <button class="shortcut-btn" data-latex="\pi">&pi;</button>
            <button class="shortcut-btn" data-latex="\theta">&theta;</button>
            <button class="shortcut-btn" data-latex="\alpha">&alpha;</button>
            <button class="shortcut-btn" data-latex="\beta">&beta;</button>
            <button class="shortcut-btn" data-latex="\Delta">&Delta;</button>
            <button class="shortcut-btn" data-latex="\sum_{i=1}^{n}">Σ</button>
            <button class="shortcut-btn" data-latex="\int_{a}^{b}">∫</button>
            <button class="shortcut-btn" data-latex="\vec{A}">→A</button>
            <button class="shortcut-btn" data-latex="\lim_{x \to 0}">lim</button>
            <button class="shortcut-btn" data-latex="H_2O">H₂O</button>
            <button class="shortcut-btn" data-latex="CO_2">CO₂</button>
            <button class="shortcut-btn" data-latex="NaCl">NaCl</button>
            <button class="shortcut-btn" data-latex="C_6H_{12}O_6">C₆H₁₂O₆</button>
          </div>
        </div>
        <div class="modal-actions">
          <button id="math-cancel" class="btn-secondary">Cancel</button>
          <button id="math-insert" class="btn-primary-solid">Insert Formula</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Hidden file input for Load -->
  <input type="file" id="file-input" accept=".json" class="hidden" />

  <script type="module" src="/src/main.js"></script>
</body>
</html>
